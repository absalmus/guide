name: stitch_smart_church_guide
description: "منصة ذكية للعثور على الكنائس القبطية ومواعيد القداسات والاجتماعات"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  go_router: ^17.2.3
  google_fonts: ^8.1.0
  intl: ^0.20.2

  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  cloud_firestore: ^6.5.0
  firebase_messaging: ^16.3.0
  google_sign_in: ^7.2.0

  flutter_map: ^8.3.0
  latlong2: ^0.9.0
  geolocator: ^14.0.2
  permission_handler: ^12.0.3

  cached_network_image: ^3.4.1
  qr_flutter: ^4.1.0
  uuid: ^4.5.1
  shared_preferences: ^2.5.3
  flutter_animate: ^4.5.2
  flutter_local_notifications: ^20.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
